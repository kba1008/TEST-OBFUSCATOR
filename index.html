  <style>
html, body { height: 100%; margin: 0; font-family: 'DM Sans', sans-serif; }

.iphone-frame {
  width: 280px;
  height: 572px;
  border-radius: 40px;
  border: 6px solid #1e293b;
  background: #000;
  position: relative;
  box-shadow: 0 25px 60px rgba(30,64,175,0.18), 0 0 0 2px #334155, inset 0 0 0 2px #1e293b;
  overflow: hidden;
}
.iphone-notch {
  position: absolute;
  top: 0; left: 50%;
  transform: translateX(-50%);
  width: 120px; height: 28px;
  background: #1e293b;
  border-radius: 0 0 18px 18px;
  z-index: 20;
}
.iphone-screen {
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  border-radius: 34px;
  overflow: hidden;
  background: #fff;
}
.iphone-screen iframe {
  width: 100%; height: 100%;
  border: none;
  border-radius: 34px;
}
.iphone-home {
  position: absolute;
  bottom: 6px; left: 50%;
  transform: translateX(-50%);
  width: 100px; height: 4px;
  background: #475569;
  border-radius: 4px;
  z-index: 20;
}

.code-editor {
  background: #f8fafc;
  border: 1.5px solid #e2e8f0;
  border-radius: 10px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  line-height: 1.6;
  color: #1e293b;
  resize: none;
  outline: none;
  padding: 14px;
  width: 100%;
  height: 100%;
  tab-size: 2;
}
.code-editor:focus {
  border-color: #3b82f6;
  box-shadow: 0 0 0 3px rgba(59,130,246,0.13);
}

.tab-btn {
  padding: 7px 14px;
  font-size: 12px;
  font-weight: 600;
  border-radius: 8px;
  cursor: pointer;
  transition: all 0.18s;
  border: 1.5px solid transparent;
  background: #f1f5f9;
  color: #64748b;
  white-space: nowrap;
}
.tab-btn.active {
  background: #2563eb;
  color: #fff;
  border-color: #1d4ed8;
  box-shadow: 0 2px 8px rgba(37,99,235,0.18);
}
.tab-btn:hover:not(.active) {
  background: #e2e8f0;
  color: #1e40af;
}

.mode-toggle {
  display: flex; gap: 4px;
  background: #f1f5f9;
  border-radius: 10px;
  padding: 3px;
}
.mode-btn {
  padding: 7px 16px;
  font-size: 13px;
  font-weight: 600;
  border-radius: 8px;
  cursor: pointer;
  transition: all 0.18s;
  border: none;
  background: transparent;
  color: #64748b;
}
.mode-btn.active {
  background: #fff;
  color: #2563eb;
  box-shadow: 0 1px 4px rgba(0,0,0,0.08);
}

.toast-container {
  position: fixed;
  top: 16px; right: 16px;
  z-index: 9999;
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.toast {
  padding: 12px 18px;
  border-radius: 10px;
  font-size: 13px;
  font-weight: 500;
  color: #fff;
  animation: toastIn 0.3s ease;
  max-width: 320px;
  box-shadow: 0 8px 24px rgba(0,0,0,0.15);
}
.toast.success { background: #2563eb; }
.toast.error { background: #dc2626; }
.toast.info { background: #0ea5e9; }

@keyframes toastIn {
  from { opacity: 0; transform: translateY(-12px); }
  to { opacity: 1; transform: translateY(0); }
}

.gen-btn {
  background: linear-gradient(135deg, #2563eb, #1d4ed8);
  color: #fff;
  font-weight: 700;
  border: none;
  border-radius: 10px;
  padding: 10px 22px;
  font-size: 14px;
  cursor: pointer;
  transition: all 0.2s;
  box-shadow: 0 4px 14px rgba(37,99,235,0.25);
}
.gen-btn:hover { box-shadow: 0 6px 20px rgba(37,99,235,0.35); transform: translateY(-1px); }
.gen-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

.help-overlay {
  position: fixed; inset: 0;
  background: rgba(15,23,42,0.55);
  z-index: 1000;
  display: flex; align-items: center; justify-content: center;
  animation: fadeIn 0.2s ease;
}
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

.help-modal {
  background: #fff;
  border-radius: 16px;
  padding: 28px;
  max-width: 520px;
  width: 90%;
  max-height: 80%;
  overflow-y: auto;
  box-shadow: 0 25px 60px rgba(0,0,0,0.2);
  animation: modalIn 0.25s ease;
}
@keyframes modalIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }

.spinner {
  width: 20px; height: 20px;
  border: 2.5px solid rgba(255,255,255,0.3);
  border-top-color: #fff;
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
  display: inline-block;
}
@keyframes spin { to { transform: rotate(360deg); } }

.file-size-badge {
  font-size: 10px;
  font-weight: 600;
  padding: 2px 7px;
  border-radius: 6px;
  background: #dbeafe;
  color: #1d4ed8;
}

.version-badge {
  font-size: 11px;
  font-weight: 700;
  padding: 3px 10px;
  border-radius: 8px;
  background: linear-gradient(135deg, #2563eb, #3b82f6);
  color: #fff;
}

::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 6px; }

@media (max-width: 900px) {
  .main-layout { flex-direction: column !important; }
  .iphone-frame { width: 220px; height: 450px; border-radius: 32px; }
  .iphone-notch { width: 90px; height: 22px; border-radius: 0 0 14px 14px; }
  .iphone-screen { border-radius: 26px; }
  .iphone-screen iframe { border-radius: 26px; }
}
</style>

  <script>
// ========== STATE ==========
const state = {
  mode: 'new',
  currentTab: 'index',
  version: { major: 1, minor: 0 },
  files: {
    index: '',
    manifest: '',
    sw: '',
    gas: '',
    other: ''
  },
  changelog: [],
  isGenerating: false
};

// ========== ELEMENT SDK ==========
const defaultConfig = {
  app_title: 'PWA Generator Studio',
  background_color: '#eff6ff',
  surface_color: '#ffffff',
  text_color: '#1e293b',
  primary_action: '#2563eb',
  secondary_action: '#64748b'
};

window.elementSdk.init({
  defaultConfig,
  onConfigChange: async (config) => {
    const title = config.app_title || defaultConfig.app_title;
    const bg = config.background_color || defaultConfig.background_color;
    const surface = config.surface_color || defaultConfig.surface_color;
    const text = config.text_color || defaultConfig.text_color;
    const primary = config.primary_action || defaultConfig.primary_action;
    const secondary = config.secondary_action || defaultConfig.secondary_action;

    const el = id => document.getElementById(id);
    const appRoot = el('app-root');
    if (appRoot) appRoot.style.background = `linear-gradient(180deg, ${bg} 0%, ${surface} 40%)`;

    const titleEl = el('appTitle');
    if (titleEl) { titleEl.textContent = title; titleEl.style.color = text; }

    document.querySelectorAll('.gen-btn').forEach(b => {
      b.style.background = `linear-gradient(135deg, ${primary}, ${primary})`;
    });
    document.querySelectorAll('.tab-btn.active').forEach(b => {
      b.style.background = primary; b.style.borderColor = primary;
    });
    document.querySelectorAll('.version-badge').forEach(b => {
      b.style.background = `linear-gradient(135deg, ${primary}, ${primary})`;
    });
  },
  mapToCapabilities: (config) => ({
    recolorables: [
      { get: () => config.background_color || defaultConfig.background_color, set: (v) => { config.background_color = v; window.elementSdk.setConfig({ background_color: v }); } },
      { get: () => config.surface_color || defaultConfig.surface_color, set: (v) => { config.surface_color = v; window.elementSdk.setConfig({ surface_color: v }); } },
      { get: () => config.text_color || defaultConfig.text_color, set: (v) => { config.text_color = v; window.elementSdk.setConfig({ text_color: v }); } },
      { get: () => config.primary_action || defaultConfig.primary_action, set: (v) => { config.primary_action = v; window.elementSdk.setConfig({ primary_action: v }); } },
      { get: () => config.secondary_action || defaultConfig.secondary_action, set: (v) => { config.secondary_action = v; window.elementSdk.setConfig({ secondary_action: v }); } }
    ],
    borderables: [],
    fontEditable: {
      get: () => config.font_family || 'DM Sans',
      set: (v) => { config.font_family = v; window.elementSdk.setConfig({ font_family: v }); }
    },
    fontSizeable: undefined
  }),
  mapToEditPanelValues: (config) => new Map([
    ['app_title', config.app_title || defaultConfig.app_title]
  ])
});

// ========== UTILITY FUNCTIONS ==========

function showToast(message, type = 'info') {
  const container = document.getElementById('toastContainer');
  const toast = document.createElement('div');
  toast.className = `toast ${type}`;
  toast.textContent = message;
  container.appendChild(toast);
  setTimeout(() => { toast.style.opacity = '0'; toast.style.transition = 'opacity 0.3s'; setTimeout(() => toast.remove(), 300); }, 3500);
}

function toggleKeyVisibility() {
  const input = document.getElementById('apiKeyInput');
  input.type = input.type === 'password' ? 'text' : 'password';
}

function formatFileSize(str) {
  const bytes = new Blob([str || '']).size;
  if (bytes === 0) return '0 B';
  if (bytes < 1024) return bytes + ' B';
  if (bytes < 1048576) return (bytes / 1024).toFixed(1) + ' KB';
  return (bytes / 1048576).toFixed(2) + ' MB';
}

function updateFileSizeBadge() {
  const code = state.files[state.currentTab] || '';
  document.getElementById('fileSizeBadge').textContent = formatFileSize(code);
}

function updateVersionBadge() {
  document.getElementById('versionBadge').textContent = `v${state.version.major}.${state.version.minor}`;
}

// ========== MODE TOGGLE ==========
function setMode(mode) {
  state.mode = mode;
  document.getElementById('modeNew').classList.toggle('active', mode === 'new');
  document.getElementById('modeEditor').classList.toggle('active', mode === 'editor');
  
  // Properly show/hide paste code section
  const pasteSection = document.getElementById('pasteCodeSection');
  if (mode === 'editor') {
    pasteSection.classList.remove('hidden');
    pasteSection.style.display = 'block';
  } else {
    pasteSection.classList.add('hidden');
    pasteSection.style.display = 'none';
  }
  
  // Update button text and clear input on mode change
  document.getElementById('genBtnText').textContent = mode === 'new' ? 'Jana PWA' : 'Repair / Ubah Suai';
  if (mode === 'editor') {
    document.getElementById('promptInput').placeholder = 'Terangkan perubahan yang anda mahu buat pada kod...';
  } else {
    document.getElementById('promptInput').placeholder = 'Huraikan aplikasi PWA yang anda mahu...';
  }
  
  lucide.createIcons();
}

// ========== TAB SWITCHING ==========
function switchTab(tab) {
  state.currentTab = tab;
  document.querySelectorAll('.tab-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.tab === tab);
  });
  document.getElementById('codeDisplay').value = state.files[tab] || '';
  updateFileSizeBadge();
}

// ========== PREVIEW ==========
function refreshPreview() {
  const frame = document.getElementById('previewFrame');
  let html = state.files.index || '';
  if (!html.trim()) {
    frame.srcdoc = "<html><body style='display:flex;align-items:center;justify-content:center;height:100%;font-family:sans-serif;color:#94a3b8;background:#f8fafc;'><div style='text-align:center;'><p style='font-size:36px;margin:0;'>📱</p><p style='font-size:13px;margin-top:8px;'>Pratonton PWA</p></div></body></html>";
    return;
  }
  // Inject viewport meta for mobile preview
  if (!html.includes('viewport')) {
    html = html.replace('<head>', '<head><meta name="viewport" content="width=device-width,initial-scale=1.0">');
  }
  frame.srcdoc = html;
}

// ========== COPY & DOWNLOAD ==========
function copyCurrentCode() {
  const code = state.files[state.currentTab];
  if (!code) { showToast('Tiada kod untuk disalin', 'error'); return; }
  navigator.clipboard.writeText(code).then(() => showToast('Kod berjaya disalin!', 'success')).catch(() => showToast('Gagal menyalin', 'error'));
}

function downloadAllFiles() {
  const fileNames = { index: 'index.html', manifest: 'manifest.json', sw: 'sw.js', gas: 'google-apps-script.gs', other: 'other.txt' };
  let hasFile = false;
  for (const [key, content] of Object.entries(state.files)) {
    if (content && content.trim()) {
      hasFile = true;
      const blob = new Blob([content], { type: 'text/plain' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url; a.download = fileNames[key]; a.click();
      URL.revokeObjectURL(url);
    }
  }
  if (!hasFile) showToast('Tiada fail untuk dimuat turun', 'error');
  else showToast('Semua fail dimuat turun!', 'success');
}

// ========== ERROR DETECTION SYSTEM ==========
const errorDetector = {
  errors: [],
  warnings: [],

  validateJSON(str, type) {
    try {
      JSON.parse(str);
      return { valid: true };
    } catch (e) {
      return { valid: false, error: `${type} JSON tidak sah: ${e.message}` };
    }
  },

  validateHTML(str) {
    const issues = [];
    // Check for unclosed tags
    const tagPattern = /<(\w+)[^>]*>/g;
    const closedTags = new Set(['img', 'input', 'br', 'hr', 'meta', 'link']);
    let match;
    while ((match = tagPattern.exec(str)) !== null) {
      const tag = match[1].toLowerCase();
      if (!closedTags.has(tag) && !str.includes(`</${tag}>`)) {
        issues.push(`Tag <${tag}> mungkin tidak ditutup`);
      }
    }
    // Check for basic HTML structure
    if (!str.includes('<html') && str.includes('<body')) issues.push('HTML structure tidak lengkap - tiada <html> tag');
    if (!str.includes('<!doctype html') && !str.includes('<!DOCTYPE html')) issues.push('DOCTYPE declaration hilang');
    // Check for meta viewport
    if (!str.includes('viewport') && str.includes('<head')) issues.push('Meta viewport hilang - PWA mungkin tidak responsive');
    return issues;
  },

  validateManifest(str) {
    const issues = [];
    try {
      const manifest = JSON.parse(str);
      if (!manifest.name) issues.push('Manifest: "name" diperlukan');
      if (!manifest.short_name) issues.push('Manifest: "short_name" diperlukan');
      if (!manifest.start_url) issues.push('Manifest: "start_url" diperlukan (sepatutnya "/" atau "./index.html")');
      if (!manifest.display) issues.push('Manifest: "display" diperlukan (sepatutnya "standalone")');
      if (!manifest.icons || manifest.icons.length === 0) issues.push('Manifest: sekurang-kurangnya 1 icon diperlukan');
      if (!manifest.theme_color) issues.push('Manifest: "theme_color" diperlukan');
      if (!manifest.background_color) issues.push('Manifest: "background_color" diperlukan');
    } catch (e) {
      issues.push(`Manifest JSON tidak sah: ${e.message}`);
    }
    return issues;
  },

  validateServiceWorker(str) {
    const issues = [];
    if (!str.includes('self.addEventListener')) issues.push('Service Worker: tiada event listener');
    if (!str.includes('install') && !str.includes("'install'")) issues.push('Service Worker: tiada install event');
    if (!str.includes('fetch') && !str.includes("'fetch'")) issues.push('Service Worker: tiada fetch event (caching tidak akan berfungsi)');
    if (!str.includes('activate') && !str.includes("'activate'")) issues.push('Service Worker: tiada activate event');
    return issues;
  },

  validateIndex(str) {
    const issues = [];
    if (!str.includes('navigator.serviceWorker') && !str.includes('serviceWorker')) {
      issues.push('Index.html: Service Worker tidak didaftarkan');
    }
    if (!str.includes('manifest')) {
      issues.push('Index.html: manifest.json tidak dirujuk');
    }
    if (!str.includes('charset') && !str.includes('utf-8')) {
      issues.push('Index.html: Charset encoding tidak ditetapkan');
    }
    if (!str.includes('<title>')) {
      issues.push('Index.html: Page title hilang');
    }
    return issues;
  },

  scan() {
    this.errors = [];
    this.warnings = [];

    // Validate each file
    if (state.files.index && state.files.index.trim()) {
      const htmlIssues = this.validateHTML(state.files.index);
      const indexIssues = this.validateIndex(state.files.index);
      [...htmlIssues, ...indexIssues].forEach(issue => {
        if (issue.includes('mungkin') || issue.includes('tidak akan')) {
          this.warnings.push({ file: 'index.html', msg: issue });
        } else {
          this.errors.push({ file: 'index.html', msg: issue });
        }
      });
    }

    if (state.files.manifest && state.files.manifest.trim()) {
      const manifestIssues = this.validateManifest(state.files.manifest);
      manifestIssues.forEach(issue => {
        if (issue.includes('diperlukan')) {
          this.errors.push({ file: 'manifest.json', msg: issue });
        } else {
          this.warnings.push({ file: 'manifest.json', msg: issue });
        }
      });
    }

    if (state.files.sw && state.files.sw.trim()) {
      const swIssues = this.validateServiceWorker(state.files.sw);
      swIssues.forEach(issue => {
        if (issue.includes('tidak akan')) {
          this.warnings.push({ file: 'sw.js', msg: issue });
        } else {
          this.errors.push({ file: 'sw.js', msg: issue });
        }
      });
    }

    return { errors: this.errors, warnings: this.warnings };
  }
};

// ========== HELP / CHANGELOG / DIAGNOSTICS ==========
function showHelp() {
  const content = document.getElementById('helpContent');
  const { errors, warnings } = errorDetector.scan();

  let html = '';

  // Diagnostics Section
  if (errors.length > 0 || warnings.length > 0) {
    html += '<div class="mb-4">';
    html += '<h3 class="font-bold text-slate-800 mb-2">🔍 Pengesan Ralat</h3>';

    if (errors.length > 0) {
      html += '<div class="mb-2">';
      errors.forEach(err => {
        html += `<div class="p-2 bg-red-50 border border-red-200 rounded-lg mb-2">
          <p class="text-xs font-semibold text-red-700">❌ ${err.file}</p>
          <p class="text-xs text-red-600 mt-1">${err.msg}</p>
        </div>`;
      });
      html += '</div>';
    }

    if (warnings.length > 0) {
      html += '<div>';
      warnings.forEach(warn => {
        html += `<div class="p-2 bg-yellow-50 border border-yellow-200 rounded-lg mb-2">
          <p class="text-xs font-semibold text-yellow-700">⚠️ ${warn.file}</p>
          <p class="text-xs text-yellow-600 mt-1">${warn.msg}</p>
        </div>`;
      });
      html += '</div>';
    }
    html += '</div>';
  } else if (Object.values(state.files).some(f => f && f.trim())) {
    html += '<div class="p-3 bg-green-50 border border-green-200 rounded-xl mb-4"><p class="text-sm font-semibold text-green-700">✅ Semua fail terlihat baik!</p></div>';
  }

  // Changelog Section
  html += '<h3 class="font-bold text-slate-800 mb-2">📋 Log Perubahan</h3>';
  if (state.changelog.length === 0) {
    html += '<p class="text-slate-400">Belum ada perubahan dijana lagi.</p>';
  } else {
    state.changelog.forEach(log => {
      html += `
        <div class="p-3 bg-blue-50 rounded-xl border border-blue-100 mb-2">
          <div class="flex items-center gap-2 mb-1">
            <span class="version-badge text-xs">v${log.version}</span>
            <span class="text-xs text-slate-400">${log.timestamp}</span>
          </div>
          <p class="text-sm text-slate-700 font-medium">${log.mode === 'new' ? '🆕 Jana Baru' : '🔧 Repair/Ubah Suai'}</p>
          <p class="text-xs text-slate-500 mt-1">${log.summary}</p>
        </div>
      `;
    });
  }

  content.innerHTML = html;
  document.getElementById('helpOverlay').style.display = 'flex';
  lucide.createIcons();
}

function closeHelp() {
  document.getElementById('helpOverlay').style.display = 'none';
}
